name: Build Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update"
        required: true
        default: "v5.2.1"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PACKAGE_DIRS: "homebox ookla-speedtest luci-app-netspeedtest"

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.release_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  scan-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.scan.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - name: Scan package directories
        id: scan
        shell: bash
        run: |
          PACKAGES_JSON="[]"
          for dir in ${{ env.PACKAGE_DIRS }}; do
            if [ ! -d "$dir" ] || [ ! -f "$dir/Makefile" ]; then
              echo "::error::$dir is not a valid package directory"
              exit 1
            fi
            PKG_NAME=$(sed -n 's/^PKG_NAME[[:space:]]*:=[[:space:]]*//p' "$dir/Makefile" | head -1)
            PKG_VERSION=$(sed -n 's/^PKG_VERSION[[:space:]]*:=[[:space:]]*//p' "$dir/Makefile" | head -1)
            PKG_TITLE=$(sed -n 's/^[[:space:]]*\(LUCI_\)\?TITLE[[:space:]]*:=[[:space:]]*//p' "$dir/Makefile" | head -1)
            PKG_NAME=${PKG_NAME:-$dir}
            PACKAGES_JSON=$(jq -c \
              --arg name "$PKG_NAME" \
              --arg version "$PKG_VERSION" \
              --arg title "$PKG_TITLE" \
              '. + [{"name": $name, "version": $version, "title": $title}]' \
              <<< "$PACKAGES_JSON")
          done
          {
            echo "packages<<EOF"
            echo "$PACKAGES_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }} / ${{ matrix.sdk }}
    needs: [get-version, scan-packages]
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - aarch64_generic
          - arm_cortex-a7
          - arm_cortex-a9
          - x86_64
        sdk:
          - openwrt-24.10
          - SNAPSHOT
          - openwrt-25.12

    steps:
      - uses: actions/checkout@v4

      - name: Build packages
        uses: sirpdboy/gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: ${{ env.PACKAGE_DIRS }}
          NO_REFRESH_CHECK: true

      - name: Verify package output
        shell: bash
        run: |
          PACKAGE_PATH="bin/packages/${{ matrix.arch }}/packages_ci"
          if [ ! -d "$PACKAGE_PATH" ]; then
            echo "::error::Package output directory not found: $PACKAGE_PATH"
            exit 1
          fi
          if ! find "$PACKAGE_PATH" -maxdepth 1 -type f \( -name '*.apk' -o -name '*.ipk' \) -print -quit | grep -q .; then
            echo "::error::No APK or IPK packages were produced in $PACKAGE_PATH"
            exit 1
          fi

      - name: Create release archive
        shell: bash
        run: |
          tar -czf "${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz" \
            -C "bin/packages/${{ matrix.arch }}" packages_ci

      - name: Upload package archive
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.sdk }}-${{ matrix.arch }}
          path: ${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: [get-version, scan-packages, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all package archives
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true

      - name: Generate release notes
        env:
          VERSION: ${{ needs.get-version.outputs.version }}
          PACKAGES_JSON: ${{ needs.scan-packages.outputs.packages }}
        shell: bash
        run: |
          {
            echo "# OpenWrt packages $VERSION"
            echo
            echo "- OpenWrt 24.10: IPK packages"
            echo "- OpenWrt SNAPSHOT: APK packages"
            echo "- OpenWrt 25.12: APK packages"
            echo
            echo "## Packages"
            echo
            echo "| Package | Version | Description |"
            echo "|---|---|---|"
            jq -r '.[] | "| `\(.name)` | `\(.version)` | \(.title) |"' <<< "$PACKAGES_JSON"
            echo
            echo "Choose the archive matching your firmware series and package architecture."
          } > release-notes.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: OpenWrt Packages ${{ needs.get-version.outputs.version }}
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*.tar.gz
          fail_on_unmatched_files: true
